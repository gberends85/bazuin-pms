# Autostalling De Bazuin — Nginx Reverse Proxy
# Vervangt alle drie services achter HTTPS

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=booking:10m rate=5r/m;

# ── Klantportal: parkeren-harlingen.nl ──────────────────────
server {
    listen 80;
    server_name parkeren-harlingen.nl www.parkeren-harlingen.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name parkeren-harlingen.nl www.parkeren-harlingen.nl;

    ssl_certificate     /etc/letsencrypt/live/parkeren-harlingen.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/parkeren-harlingen.nl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── API: api.autostallingdebazuin.nl ────────────────────────
server {
    listen 80;
    server_name api.autostallingdebazuin.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.autostallingdebazuin.nl;

    ssl_certificate     /etc/letsencrypt/live/autostallingdebazuin.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autostallingdebazuin.nl/privkey.pem;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Stripe webhook: geen rate limiting, raw body vereist
    location /api/v1/payments/webhook {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Geen rate limiting op webhook
    }

    # Boekingen: strenger rate limiting
    location /api/v1/reservations {
        limit_req zone=booking burst=10 nodelay;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Overige API
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Admin: admin.autostallingdebazuin.nl ────────────────────
server {
    listen 80;
    server_name admin.autostallingdebazuin.nl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.autostallingdebazuin.nl;

    ssl_certificate     /etc/letsencrypt/live/autostallingdebazuin.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/autostallingdebazuin.nl/privkey.pem;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Optioneel: IP-whitelist voor extra beveiliging
    # allow 1.2.3.4;    # jouw kantoor IP
    # deny all;

    location / {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
